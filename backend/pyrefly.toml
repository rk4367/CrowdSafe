# Pyrefly configuration for CrowdSafe backend
# Tells Pyrefly to use the project venv so it can resolve third-party packages
# (flask, numpy, opencv, firebase-admin, Pillow, etc.)

python_interpreter = "../venv/Scripts/python.exe"

# Search paths — backend root + venv site-packages
search_path = [
    ".",
    "../venv/Lib/site-packages",
]
